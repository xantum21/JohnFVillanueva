function generateCalcSet(n=65){
  const arr=[];
  const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }
  for(let i=0;i<n;i++){
    const t = i%5;
    if(t===0){
      const vol=rnd(50,1000); const min=rnd(30,240);
      const rate=Math.round((vol/(min/60))*10)/10;
      let opts=[rate, Math.round(rate*0.9), Math.round(rate*1.1), Math.round(rate+20)];
      shuffle(opts);
      arr.push({topic:'Calc', type:'MCQ', stem:`Infuse ${vol} mL over ${min} min. Set pump to:`, options:opts.map(x=>`${x} mL/hr`), answerIndex:opts.indexOf(`${rate} mL/hr`), answers:[opts.indexOf(`${rate} mL/hr`)], rationale:`${vol} ÷ (${min}/60) = ${rate} mL/hr.`});
    } else if(t===1){
      const vol=rnd(250,1000); const hr=rnd(1,8); const drop=[10,15,20][rnd(0,2)];
      const gtt = Math.round((vol/hr)/60*drop);
      let opts=[gtt, gtt+5, gtt-5, gtt+10].map(x=>`${x} gtt/min`);
      shuffle(opts);
      arr.push({topic:'Calc', type:'MCQ', stem:`${vol} mL over ${hr} hr using ${drop} gtt/mL tubing. Drop rate:`, options:opts, answerIndex:opts.indexOf(`${gtt} gtt/min`), answers:[opts.indexOf(`${gtt} gtt/min`)], rationale:`(${vol}/${hr} hr) ÷ 60 × ${drop} = ${gtt} gtt/min.`});
    } else if(t===2){
      const concMg=rnd(100,500); const perMl=5;
      const ordered=rnd(50,concMg*2-50);
      const vol = Math.round((ordered/concMg*perMl)*10)/10;
      let opts=[vol, Math.round(vol*0.8*10)/10, Math.round(vol*1.2*10)/10, Math.round((vol+1)*10)/10].map(x=>`${x} mL`);
      shuffle(opts);
      arr.push({topic:'Calc', type:'MCQ', stem:`Label ${concMg} mg/${perMl} mL. Give ${ordered} mg. How many mL?`, options:opts, answerIndex:opts.indexOf(`${vol} mL`), answers:[opts.indexOf(`${vol} mL`)], rationale:`${ordered} × (${perMl}/${concMg}) = ${vol} mL.`});
    } else if(t===3){
      const mg=rnd(200,800); const mL=rnd(250,500); const mLhr=rnd(5,20); const kg=rnd(50,100);
      const mcgPerMl = (mg*1000)/mL;
      const mcgPerMin = (mLhr*mcgPerMl)/60;
      const dose = Math.round((mcgPerMin/kg)*10)/10;
      let opts=[dose, Math.round(dose*0.6*10)/10, Math.round(dose*1.4*10)/10, Math.round((dose+1.5)*10)/10].map(x=>`${x}`);
      shuffle(opts);
      arr.push({topic:'Calc', type:'MCQ', stem:`${mg} mg in ${mL} mL running at ${mLhr} mL/hr for a ${kg}-kg client. What mcg/kg/min?`, options:opts, answerIndex:opts.indexOf(`${dose}`), answers:[opts.indexOf(`${dose}`)], rationale:`(${mg} mg/${mL} mL = ${mcgPerMl.toFixed(1)} mcg/mL) → ${mLhr} mL/hr = ${(mcgPerMin).toFixed(1)} mcg/min; ÷ ${kg} kg ≈ ${dose} mcg/kg/min.`});
    } else {
      const kg=rnd(10,120); const doseMgKg=[5,7.5,10,15][rnd(0,3)]; const tab=[100,250,500][rnd(0,2)];
      const total = Math.round(kg*doseMgKg);
      const tabsNeeded = Math.round(total/tab*10)/10;
      let opts=[tabsNeeded, Math.round((tabsNeeded+0.5)*10)/10, Math.round((tabsNeeded*0.8)*10)/10, Math.round((tabsNeeded*1.2)*10)/10].map(x=>`${x} tabs`);
      shuffle(opts);
      arr.push({topic:'Calc', type:'MCQ', stem:`Order: ${doseMgKg} mg/kg for ${kg}-kg pt. Tablets are ${tab} mg each. How many tablets (round to 0.1)?`, options:opts, answerIndex:opts.indexOf(`${tabsNeeded} tabs`), answers:[opts.indexOf(`${tabsNeeded} tabs`)], rationale:`${kg}×${doseMgKg}=${total} mg total; ÷${tab} mg ≈ ${tabsNeeded} tabs.`});
    }
  }
  return arr;
}

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }

const state = {
  order: [], index: 0, correct: 0, seen: 0,
  perTopic: {}, mode: 'adaptive', topic: 'All', timer: 90, tLeft: null, tId: null,
  sfx:false, music:false
};

const $ = s => document.querySelector(s);
const meta=$('#meta'), stem=$('#stem'), opts=$('#opts'), rat=$('#rat'), status=$('#status'), prog=$('#progress'), toast=$('#toast'), topicChip=$('#topicChip');

let BANK = [];

function init(){
  const generated = generateCalcSet(70);
  BANK = BASE_BANK.concat(generated);
  BANK.push(
    {topic:'Anticoagulants', type:'MCQ', stem:'Enoxaparin teaching includes which key point?', options:['Massage injection site vigorously','Inject into deltoid','Do not expel air bubble from prefilled syringe','Aspirin is always safe with it'], answerIndex:2, answers:[2], rationale:'Do not expel air bubble; inject in abdomen; avoid massaging; caution with other anticoagulants.'},
    {topic:'Glaucoma', type:'MCQ', stem:'Which combo is dorzolamide + timolol?', options:['Cosopt','Combigan','Simbrinza','DuoTrav'], answerIndex:0, answers:[0], rationale:'Cosopt = dorzolamide/timolol.'},
    {topic:'Analgesics', type:'MCQ', stem:'Which finding after morphine requires immediate action?', options:['BP 100/60','RR 7/min','Itching','Pinpoint pupils'], answerIndex:1, answers:[1], rationale:'RR 7/min indicates respiratory depression.'},
    {topic:'Psych', type:'MCQ', stem:'Which antidepressant is safest in sexual dysfunction risk?', options:['Paroxetine','Fluoxetine','Sertraline','Bupropion'], answerIndex:3, answers:[3], rationale:'Bupropion has lower sexual side effect burden.'}
  );

  const topics = Array.from(new Set(BANK.map(x=>x.topic)));
  const topicSel = $('#topic'); topicSel.innerHTML='';
  const allOpt=document.createElement('option'); allOpt.value='All'; allOpt.textContent='All'; topicSel.appendChild(allOpt);
  topics.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; topicSel.appendChild(o); });
  topics.forEach(t=>state.perTopic[t]={right:0,wrong:0});
  state.order = BANK.map((_,i)=>i);
  shuffle(state.order);
  renderTracker();
  setMode($('#mode').value);
  setTimer($('#timer').value);
  bindUI();
  $('#banksize').textContent = BANK.length;
  nextQ(true);
}

function bindUI(){
  $('#next').onclick = ()=> nextQ();
  $('#reset').onclick = resetStats;
  $('#show').onclick = showAnswer;
  $('#again').onclick = againSoon;
  $('#mode').onchange = e => setMode(e.target.value);
  $('#topic').onchange = e => { state.topic = e.target.value; resetOrderForTopic(); nextQ(true); };
  $('#timer').onchange = e => setTimer(e.target.value);
  $('#sfx').onclick = ()=>{ state.sfx=!state.sfx; $('#sfx').textContent = state.sfx?'🔊 Sound: On':'🔊 Sound: Off'; };
  $('#music').onclick = ()=>{ state.music=!state.music; $('#music').textContent = state.music?'🎵 Music: On':'🎵 Music: Off'; };
  $('#export').onclick = exportStats;
}

function setMode(m){ state.mode=m; resetOrderForTopic(); }
function setTimer(v){
  state.timer = v==='off'? null : parseInt(v,10);
  resetCountdown();
}
function resetCountdown(){
  if(state.tId) clearInterval(state.tId);
  if(state.timer==null){ $('#status').textContent='Timer off'; return; }
  state.tLeft = state.timer;
  $('#status').textContent=`${state.tLeft}s remaining`;
  state.tId = setInterval(()=>{
    state.tLeft--;
    $('#status').textContent=`${state.tLeft}s remaining`;
    if(state.tLeft<=0){ clearInterval(state.tId); showAnswer(); }
  },1000);
}

function resetOrderForTopic(){
  const filtered = state.topic==='All' ? BANK.map((_,i)=>i) : BANK.map((x,i)=>[x,i]).filter(([x])=>x.topic===state.topic).map(([_,i])=>i);
  state.order = filtered;
  shuffle(state.order);
  state.index = 0;
  updateProgress();
}

function renderTracker(){
  const el=$('#track'); el.innerHTML='';
  Object.keys(state.perTopic).forEach(t=>{
    const r=state.perTopic[t].right, w=state.perTopic[t].wrong;
    const name=document.createElement('div'); name.textContent=t; el.appendChild(name);
    const right=document.createElement('div'); right.textContent=r; el.appendChild(right);
    const wrong=document.createElement('div'); wrong.textContent=w; el.appendChild(wrong);
  });
}

function toastMsg(msg){ const toast=document.getElementById('toast'); toast.textContent=msg; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1400); }

function nextQ(initial=false){
  if(state.index>=state.order.length){ toastMsg('End of set — reshuffling'); resetOrderForTopic(); }
  const qi = pickNextIndex();
  state.index++;
  state.seen++;
  showQuestion(qi);
  if(!initial) resetCountdown();
  updateProgress();
}

function pickNextIndex(){
  if(state.mode==='random' || state.topic!=='All') return state.order[(state.index)%state.order.length];
  const scores = Object.entries(state.perTopic).map(([t,s])=>[t, s.right+s.wrong>0 ? (s.right/(s.right+s.wrong)) : 1]);
  scores.sort((a,b)=>a[1]-b[1]);
  for(const [worst] of scores){
    const candidates = BANK.map((x,i)=>[x,i]).filter(([x])=>x.topic===worst).map(([_,i])=>i);
    if(candidates.length){ return candidates[Math.floor(Math.random()*candidates.length)]; }
  }
  return state.order[(state.index)%state.order.length];
}

function showQuestion(qi){
  const q = BANK[qi];
  const meta=$('#meta'); meta.innerHTML = '';
  const b1=document.createElement('div'); b1.className='badge'; b1.textContent=q.type; meta.appendChild(b1);
  const b2=document.createElement('div'); b2.className='badge'; b2.textContent=q.topic; meta.appendChild(b2);
  $('#topicChip').textContent = q.topic;
  $('#stem').textContent = q.stem;
  const rat=$('#rat'); rat.style.display='none'; rat.textContent='';
  const opts=$('#opts'); opts.innerHTML='';
  if(q.type==='SATA'){
    q.options.forEach((opt,idx)=>{
      const el=document.createElement('label'); el.className='opt';
      el.innerHTML=`<input type="checkbox" style="margin-right:8px">${opt}`;
      el.onclick = (e)=> e.stopPropagation();
      opts.appendChild(el);
    });
    const submit=document.createElement('button'); submit.textContent='Submit'; submit.onclick=()=>{
      const chosen=[...opts.querySelectorAll('input[type="checkbox"]')].map((cb,i)=>cb.checked?i:null).filter(x=>x!==null);
      gradeSATA(q, chosen);
    };
    submit.className='pill'; opts.appendChild(submit);
  }else{
    q.options.forEach((opt,idx)=>{
      const el=document.createElement('div'); el.className='opt'; el.textContent=opt;
      el.onclick=()=>grade(q, idx);
      opts.appendChild(el);
    });
  }
}

function grade(q, idx){
  const correct = (idx===q.answerIndex);
  const nodes = document.querySelectorAll('.opt');
  nodes.forEach((n,i)=>{
    if(i===q.answerIndex) n.classList.add('correct');
    else if(i===idx) n.classList.add('incorrect');
    n.style.pointerEvents='none';
  });
  if(correct){ state.correct++; state.sfx && ding(); incTopic(q.topic,true); }
  else { state.sfx && buzz(); incTopic(q.topic,false); }
  const rat=$('#rat'); rat.style.display='block'; rat.textContent=q.rationale;
  updateProgress(); renderTracker();
}

function gradeSATA(q, chosen){
  const ans = new Set(q.answers);
  const ch = new Set(chosen);
  const nodes = document.querySelectorAll('.opt');
  nodes.forEach((n,i)=>{
    if(ans.has(i)) n.classList.add('correct');
    else if(ch.has(i)) n.classList.add('incorrect');
    n.style.pointerEvents='none';
  });
  const correct = (ans.size===ch.size) && [...ans].every(x=>ch.has(x));
  if(correct){ state.correct++; state.sfx && ding(); incTopic(q.topic,true); }
  else { state.sfx && buzz(); incTopic(q.topic,false); }
  const rat=$('#rat'); rat.style.display='block'; rat.textContent=q.rationale;
  updateProgress(); renderTracker();
}

function incTopic(t, right){ const rec=state.perTopic[t]; if(!rec) return; if(right) rec.right++; else rec.wrong++; }
function showAnswer(){
  const qtext = $('#stem').textContent;
  const q = BANK.find(x=>x.stem===qtext);
  if(!q) return;
  const nodes = document.querySelectorAll('.opt');
  if(q.type==='SATA'){
    nodes.forEach((n,i)=>{
      if(q.answers.includes(i)) n.classList.add('correct'); else n.classList.add('incorrect');
      n.style.pointerEvents='none';
    });
  }else{
    nodes.forEach((n,i)=>{
      if(i===q.answerIndex) n.classList.add('correct'); else n.classList.add('incorrect');
      n.style.pointerEvents='none';
    });
  }
  const rat=$('#rat'); rat.style.display='block'; rat.textContent=q.rationale;
}
function againSoon(){ state.index = Math.max(0, state.index-1); nextQ(); }
function updateProgress(){ $('#progress').textContent = state.seen + '/' + state.order.length + ' • Score ' + state.correct; }

function resetStats(){
  state.correct=0; state.seen=0;
  Object.keys(state.perTopic).forEach(t=>state.perTopic[t]={right:0,wrong:0});
  renderTracker(); resetOrderForTopic(); nextQ(true);
}

function exportStats(){
  const lines = ['Pharm HESI — PART 6 PLUS Results', new Date().toLocaleString(), ''];
  lines.push('Score: ' + state.correct + '/' + state.seen);
  lines.push('By Topic:');
  Object.entries(state.perTopic).forEach(([t,s])=>lines.push(`  ${t}: ${s.right} correct / ${s.wrong} wrong`));
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='Pharm_HESI_PART6_PLUS_Results.txt'; a.click();
}

init();
</script>
</body>
