"], "answerIndex": 2, "answers": [2], "rationale": "Harm reduction: naloxone access + training.", "tags": []}, {"topic": "Opioid Safety", "type": "MCQ", "stem": "Which action reduces opioid overdose deaths?", "options": ["Leaving meds in car", "Sharing pills", "Naloxone education + availability", "Crushing ER tablets"], "answerIndex": 2, "answers": [2], "rationale": "Harm reduction: naloxone access + training.", "tags": []}, {"topic": "Opioid Safety", "type": "MCQ", "stem": "Which action reduces opioid overdose deaths?", "options": ["Leaving meds in car", "Sharing pills", "Naloxone education + availability", "Crushing ER tablets"], "answerIndex": 2, "answers": [2], "rationale": "Harm reduction: naloxone access + training.", "tags": []}, {"topic": "Opioid Safety", "type": "MCQ", "stem": "Which action reduces opioid overdose deaths?", "options": ["Leaving meds in car", "Sharing pills", "Naloxone education + availability", "Crushing ER tablets"], "answerIndex": 2, "answers": [2], "rationale": "Harm reduction: naloxone access + training.", "tags": []}];

let RECENT=[]; const RECENT_MAX=12;
const WEAK_TOPICS = ["Med Safety/Math","Drug Interactions","Renal/Hepatic Dosing","OB/Repro","Onc/Immuno","Endocrine/Adrenal",
                     "Antimicrobials","GI","Neuro","Immunization","Cardio/Algorithms","Bone/Gout","Psych","Opioid Safety","Respiratory","Sensory/Glaucoma","Anticoag/Antiplatelet"];
let topicWeights={}; for(const t of WEAK_TOPICS) topicWeights[t]=2.0; for(const q of BANK) if(!topicWeights[q.topic]) topicWeights[q.topic]=1.0;

const KEY="pharm_hesi_part3_repaired_stats_v1";
let stats=JSON.parse(localStorage.getItem(KEY) || "{}"); if(!stats.version) stats={version:1, seen:0, correct:0, topics:{}};

function ensureTopic(t){ if(!stats.topics[t]) stats.topics[t]={seen:0,correct:0}; }

const es = (id)=>document.getElementById(id);
const elStem=es('stem'), elOpts=es('opts'), elRat=es('rat'), elStatus=es('status');
const elMode=es('mode'), elTimer=es('timer'), elProgress=es('progress'), elTopic=es('topic'), elTopicWrap=es('topicWrap');
const elMeta=es('meta'), elReset=es('reset'), elExport=es('export'), elNext=es('next'), elAgain=es('again');

// populate topics
const topics = Array.from(new Set(BANK.map(q=>q.topic))).sort();
for(const t of topics){ const o=document.createElement('option'); o.value=t; o.textContent=t; elTopic.appendChild(o); }

function setProgress(){ elProgress.textContent = stats.correct + "/" + stats.seen; }

let AUDIO=false, MUSIC=false;
es('sfx').onclick=()=>{ AUDIO=!AUDIO; es('sfx').textContent = AUDIO? "🔊 Sound: On":"🔊 Sound: Off"; if(AUDIO) tone(300,0.05); }
es('music').onclick=()=>{ MUSIC=!MUSIC; es('music').textContent = MUSIC? "🎵 Music: On":"🎵 Music: Off"; if(MUSIC) tone(220,0.08); }
function tone(f,d=0.12){ if(!AUDIO) return; const c=new (window.AudioContext||window.webkitAudioContext)(); const o=c.createOscillator(); const g=c.createGain(); o.connect(g); g.connect(c.destination); g.gain.value=0.05; o.frequency.value=f; o.start(); setTimeout(()=>{g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+0.08); o.stop(c.currentTime+0.1);}, d*1000); }

function pickRandom(){ let tries=0; while(tries++<60){ const q=BANK[Math.floor(Math.random()*BANK.length)]; if(!RECENT.includes(q.stem)) return q; } return BANK[Math.floor(Math.random()*BANK.length)]; }
function pickByTopic(t){ const s=BANK.filter(q=>q.topic===t); if(s.length===0) return pickRandom(); let tries=0; while(tries++<60){ const q=s[Math.floor(Math.random()*s.length)]; if(!RECENT.includes(q.stem)) return q; } return s[Math.floor(Math.random()*s.length)]; }
function pickAdaptive(){ const weighted=[]; for(const q of BANK){ ensureTopic(q.topic); const st=stats.topics[q.topic]; const acc=st.seen? st.correct/st.seen:0; let w=topicWeights[q.topic]||1; if(acc<0.7) w*=1.6; if(acc<0.5) w*=2.0; weighted.push([q,w]); } let sum=weighted.reduce((a,b)=>a+b[1],0); let r=Math.random()*sum; for(const [q,w] of weighted){ if((r-=w)<=0 && !RECENT.includes(q.stem)) return q; } for(const [q,w] of weighted){ if(!RECENT.includes(q.stem)) return q; } return weighted[0][0]; }

let current=null, allow=true, timer=null, tleft=0;

function render(q){
  current=q; allow=true; elRat.style.display='none'; elRat.textContent=""; elStatus.textContent="Select the best answer."; elOpts.innerHTML=""; elMeta.innerHTML="";
  elMeta.append(badge(q.type), badge(q.topic));
  elStem.textContent=q.stem;
  q.options.forEach((opt,i)=>{ const d=document.createElement('div'); d.className='opt'; d.textContent=opt;
    d.onclick=()=>{ if(!allow) return; finish([i]); }; elOpts.appendChild(d); });
  es('show').onclick=()=>finish(q.answers); elAgain.onclick=()=>render(q);

  if(timer) clearInterval(timer); const tv=elTimer.value;
  if(tv!=="off"){ tleft=parseInt(tv,10); elStatus.textContent="⏱️ "+tleft+"s";
    timer=setInterval(()=>{ if(!allow){clearInterval(timer);return;} tleft--; elStatus.textContent="⏱️ "+tleft+"s"; if(tleft<=0){ clearInterval(timer); allow=false; reveal(false); } },1000);
  }
}

function reveal(correct){
  Array.from(elOpts.children).forEach((node,idx)=>{ const ok=current.answers.includes(idx); node.classList.add(ok?'correct':'incorrect'); });
  stats.seen++; ensureTopic(current.topic); stats.topics[current.topic].seen++;
  if(correct){ stats.correct++; stats.topics[current.topic].correct++; playSFX('correctSound'); } else { playSFX('wrongSound'); }
  localStorage.setItem(KEY, JSON.stringify(stats));
  elRat.textContent=current.rationale; elRat.style.display='block'; setProgress();
  RECENT.unshift(current.stem); if(RECENT.length>RECENT_MAX) RECENT.pop();
}

function finish(sel){ if(!allow) return; allow=false;
  const a = sel.slice().sort((x,y)=>x-y); const b = current.answers.slice().sort((x,y)=>x-y);
  let ok = a.length===b.length && a.every((v,i)=>v===b[i]); reveal(ok);
}

function badge(t){ const b=document.createElement('div'); b.className='badge'; b.textContent=t; return b; }
function nextQ(){ let q=null; if(elMode.value==='random') q=pickRandom(); else if(elMode.value==='topic') q=pickByTopic(elTopic.value); else q=pickAdaptive(); render(q); }

function buildTracker(){
  const c=es('track'); c.innerHTML="";
  const ts=Array.from(new Set(BANK.map(q=>q.topic))).sort();
  ts.forEach(t=>{
    ensureTopic(t); const s=stats.topics[t]; const acc=s.seen? Math.round(100*s.correct/s.seen):0;
    const d1=document.createElement('div'); d1.textContent=t;
    const d2=document.createElement('div'); d2.textContent=(s.seen||0)+" seen";
    const d3=document.createElement('div'); d3.textContent=acc+"%";
    d3.style.color = acc>=85? '#56f39a' : acc>=70? '#ffd166' : '#ff6b6b';
    c.appendChild(d1); c.appendChild(d2); c.appendChild(d3);
  });
}

elNext.onclick=nextQ;
elMode.onchange=()=>{ elTopicWrap.style.display = (elMode.value==='topic')? 'block':'none'; };
elReset.onclick=()=>{ if(confirm('Reset stats?')){ localStorage.removeItem(KEY); stats={version:1,seen:0,correct:0,topics:{}}; setProgress(); buildTracker(); } };
elExport.onclick=()=>{ const blob=new Blob([JSON.stringify(stats,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='part3_repaired_stats.json'; a.click(); };

setProgress(); buildTracker(); elTopicWrap.style.display='none'; nextQ();


document.addEventListener('DOMContentLoaded', ()=>{
  const bgm=document.getElementById('bgm');
  const btn=document.getElementById('music')||document.getElementById('toggleMusic');
  if(bgm && btn){
    btn.addEventListener('click', ()=>{
      if(bgm.paused){ bgm.play().catch(()=>{}); btn.textContent='🎵 Music: On'; }
      else{ bgm.pause(); btn.textContent='🎵 Music: Off'; }
    });
  }
  const sbtn=document.getElementById('sfx')||document.getElementById('toggleSfx');
  if(sbtn){
    sbtn.addEventListener('click', ()=>{
      sbtn.textContent = (sbtn.textContent.includes('Off'))? '🔊 Sound: On' : '🔊 Sound: Off';
    });
  }
});
</script></body>
