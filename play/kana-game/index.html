<title>Romaji to Kana Game</title>
<style>

    input[type="text"] {

    button {
      font-size: 1em;

    }
    #leaderboard, #gameSection {
      display: none;

    table {
      margin: auto;
      width: 80%;

    }
    th, td {
      padding: 10px;

    }
    #leaderboardBtn {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    #returnBtn {
      position: absolute;
      top: 20px;

    }
    #resetBtnBottom {
      margin-top: 30px;
    }
  </style>

<body><nav aria-label="Interactive media navigation" class="jv-play-nav"><a href="/play/">← Play Hub</a><a class="secondary" href="/projects.html">Portfolio Projects</a></nav>
<button id="leaderboardBtn" onclick="showLeaderboard()">Leaderboard</button>
<!-- GAME SECTION -->
<div id="gameSection">
<h1>Romaji to Kana Quiz</h1>
<div id="question">Loading...</div>
<input id="answerInput" type="text"/>
<button onclick="checkAnswer()">Submit</button>
<div class="feedback" id="feedback"></div>
<div class="streak green" id="streakDisplay">Streak: 0</div>
<div id="musicPrompt">Click anywhere for Background Music</div>
</div>
<!-- LEADERBOARD SECTION -->
<div id="leaderboard">
<h1>Recent Leaderboard</h1>
<div id="leaderboardTable">
<table>
<thead>
<tr><th>Name</th><th>Score</th></tr>
</thead>
<tbody id="leaderboardBody"></tbody>
</table>
</div>
<button id="returnBtn" onclick="showGame()">Return to Game</button>
<button id="resetBtnBottom" onclick="resetLeaderboard()">Reset Leaderboard</button>
</div>
<audio id="bgMusic" loop="">
<source src="https://raw.githubusercontent.com/xantum21/Kana-Game/main/Menu.mp3" type="audio/mpeg"/>
</audio>
<audio id="yesSound">
<source src="https://raw.githubusercontent.com/xantum21/Kana-Game/main/Yes.mp3" type="audio/mpeg"/>
</audio>
<audio id="noSound">
<source src="https://raw.githubusercontent.com/xantum21/Kana-Game/main/No.mp3" type="audio/mpeg"/>
</audio>
<script>
    const quizData = [
      // HIRAGANA
      { romaji: "a", kana: "あ", type: "hiragana" }, { romaji: "i", kana: "い", type: "hiragana" },
      { romaji: "u", kana: "う", type: "hiragana" }, { romaji: "e", kana: "え", type: "hiragana" },
      { romaji: "o", kana: "お", type: "hiragana" }, { romaji: "ka", kana: "か", type: "hiragana" },
      { romaji: "ki", kana: "き", type: "hiragana" }, { romaji: "ku", kana: "く", type: "hiragana" },
      { romaji: "ke", kana: "け", type: "hiragana" }, { romaji: "ko", kana: "こ", type: "hiragana" },
      { romaji: "sa", kana: "さ", type: "hiragana" }, { romaji: "shi", kana: "し", type: "hiragana" },
      { romaji: "su", kana: "す", type: "hiragana" }, { romaji: "se", kana: "せ", type: "hiragana" },
      { romaji: "so", kana: "そ", type: "hiragana" }, { romaji: "ta", kana: "た", type: "hiragana" },
      { romaji: "chi", kana: "ち", type: "hiragana" }, { romaji: "tsu", kana: "つ", type: "hiragana" },
      { romaji: "te", kana: "て", type: "hiragana" }, { romaji: "to", kana: "と", type: "hiragana" },
      { romaji: "na", kana: "な", type: "hiragana" }, { romaji: "ni", kana: "に", type: "hiragana" },
      { romaji: "nu", kana: "ぬ", type: "hiragana" }, { romaji: "ne", kana: "ね", type: "hiragana" },
      { romaji: "no", kana: "の", type: "hiragana" }, { romaji: "ha", kana: "は", type: "hiragana" },
      { romaji: "hi", kana: "ひ", type: "hiragana" }, { romaji: "fu", kana: "ふ", type: "hiragana" },
      { romaji: "he", kana: "へ", type: "hiragana" }, { romaji: "ho", kana: "ほ", type: "hiragana" },
      { romaji: "ma", kana: "ま", type: "hiragana" }, { romaji: "mi", kana: "み", type: "hiragana" },
      { romaji: "mu", kana: "む", type: "hiragana" }, { romaji: "me", kana: "め", type: "hiragana" },
      { romaji: "mo", kana: "も", type: "hiragana" }, { romaji: "ya", kana: "や", type: "hiragana" },
      { romaji: "yu", kana: "ゆ", type: "hiragana" }, { romaji: "yo", kana: "よ", type: "hiragana" },
      { romaji: "ra", kana: "ら", type: "hiragana" }, { romaji: "ri", kana: "り", type: "hiragana" },
      { romaji: "ru", kana: "る", type: "hiragana" }, { romaji: "re", kana: "れ", type: "hiragana" },
      { romaji: "ro", kana: "ろ", type: "hiragana" }, { romaji: "wa", kana: "わ", type: "hiragana" },
      { romaji: "wo", kana: "を", type: "hiragana" }, { romaji: "n", kana: "ん", type: "hiragana" },

      // KATAKANA
      { romaji: "a", kana: "ア", type: "katakana" }, { romaji: "i", kana: "イ", type: "katakana" },
      { romaji: "u", kana: "ウ", type: "katakana" }, { romaji: "e", kana: "エ", type: "katakana" },
      { romaji: "o", kana: "オ", type: "katakana" }, { romaji: "ka", kana: "カ", type: "katakana" },
      { romaji: "ki", kana: "キ", type: "katakana" }, { romaji: "ku", kana: "ク", type: "katakana" },
      { romaji: "ke", kana: "ケ", type: "katakana" }, { romaji: "ko", kana: "コ", type: "katakana" },
      { romaji: "sa", kana: "サ", type: "katakana" }, { romaji: "shi", kana: "シ", type: "katakana" },
      { romaji: "su", kana: "ス", type: "katakana" }, { romaji: "se", kana: "セ", type: "katakana" },
      { romaji: "so", kana: "ソ", type: "katakana" }, { romaji: "ta", kana: "タ", type: "katakana" },
      { romaji: "chi", kana: "チ", type: "katakana" }, { romaji: "tsu", kana: "ツ", type: "katakana" },
      { romaji: "te", kana: "テ", type: "katakana" }, { romaji: "to", kana: "ト", type: "katakana" },
      { romaji: "na", kana: "ナ", type: "katakana" }, { romaji: "ni", kana: "ニ", type: "katakana" },
      { romaji: "nu", kana: "ヌ", type: "katakana" }, { romaji: "ne", kana: "ネ", type: "katakana" },
      { romaji: "no", kana: "ノ", type: "katakana" }, { romaji: "ha", kana: "ハ", type: "katakana" },
      { romaji: "hi", kana: "ヒ", type: "katakana" }, { romaji: "fu", kana: "フ", type: "katakana" },
      { romaji: "he", kana: "ヘ", type: "katakana" }, { romaji: "ho", kana: "ホ", type: "katakana" },
      { romaji: "ma", kana: "マ", type: "katakana" }, { romaji: "mi", kana: "ミ", type: "katakana" },
      { romaji: "mu", kana: "ム", type: "katakana" }, { romaji: "me", kana: "メ", type: "katakana" },
      { romaji: "mo", kana: "モ", type: "katakana" }, { romaji: "ya", kana: "ヤ", type: "katakana" },
      { romaji: "yu", kana: "ユ", type: "katakana" }, { romaji: "yo", kana: "ヨ", type: "katakana" },
      { romaji: "ra", kana: "ラ", type: "katakana" }, { romaji: "ri", kana: "リ", type: "katakana" },
      { romaji: "ru", kana: "ル", type: "katakana" }, { romaji: "re", kana: "レ", type: "katakana" },
      { romaji: "ro", kana: "ロ", type: "katakana" }, { romaji: "wa", kana: "ワ", type: "katakana" },
      { romaji: "wo", kana: "ヲ", type: "katakana" }, { romaji: "n", kana: "ン", type: "katakana" }
    ];

    let currentQuestion;
    let streak = 0;

    function loadQuestion() {
      const randomIndex = Math.floor(Math.random() * quizData.length);
      currentQuestion = quizData[randomIndex];
      document.getElementById("question").textContent = `${currentQuestion.romaji} - ${currentQuestion.type}`;
      document.getElementById("answerInput").value = "";
      document.getElementById("feedback").textContent = "";
    }

    function checkAnswer() {
      const userAnswer = document.getElementById("answerInput").value.trim();
      const isCorrect = userAnswer === currentQuestion.kana;
      const feedback = document.getElementById("feedback");
      const streakDisplay = document.getElementById("streakDisplay");

      if (isCorrect) {
        feedback.textContent = "Correct!";
        feedback.className = "feedback correct";
        document.getElementById("yesSound").play();
        streak++;
        streakDisplay.className = "streak green";
      } else {
        feedback.textContent = "Wrong";
        feedback.className = "feedback wrong";
        document.getElementById("noSound").play();
        streakDisplay.className = "streak red";
        promptAndRecordStreak();
        streak = 0;
      }

      streakDisplay.textContent = `Streak: ${streak}`;
      setTimeout(loadQuestion, 1000);
    }

    function promptAndRecordStreak() {
      const playerName = prompt("Enter your name for the leaderboard:");
      if (!playerName) return;
      const leaderboard = JSON.parse(localStorage.getItem("kana_leaderboard") || "[]");
      leaderboard.push({ name: playerName, score: streak });
      localStorage.setItem("kana_leaderboard", JSON.stringify(leaderboard));
    }

    function showGame() {
      document.getElementById("gameSection").style.display = "block";
      document.getElementById("leaderboard").style.display = "none";
      loadQuestion();
    }

    function showLeaderboard() {
      const table = document.getElementById("leaderboardBody");
      table.innerHTML = "";
      const scores = JSON.parse(localStorage.getItem("kana_leaderboard") || "[]");
      scores.slice(-10).reverse().forEach(entry => {
        const row = `<tr><td>${entry.name}</td><td>${entry.score}</td></tr>`;
        table.innerHTML += row;
      });
      document.getElementById("gameSection").style.display = "none";
      document.getElementById("leaderboard").style.display = "block";
    }

    function resetLeaderboard() {
      localStorage.removeItem("kana_leaderboard");
      showLeaderboard();
    }

    document.body.addEventListener("click", function() {
      const music = document.getElementById("bgMusic");
      if (music.paused) {
        music.play().catch(e => console.log("Music autoplay blocked."));
      }
    });

    document.getElementById("answerInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") checkAnswer();
    });

    window.onload = showGame;
  </script>
</body>
</html>
