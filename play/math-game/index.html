<body><nav aria-label="Interactive media navigation" class="jv-play-nav"><a href="/play/">← Play Hub</a><a class="secondary" href="/projects.html">Portfolio Projects</a></nav>
<button id="leaderboardBtn" onclick="showLeaderboard()">Leaderboard</button>
<div id="gameSection">
<h1>Math Quiz Game</h1>
<div id="question">Loading...</div>
<input id="answerInput" type="text"/>
<button onclick="checkAnswer()">Submit</button>
<div class="feedback" id="feedback"></div>
<div class="streak green" id="streakDisplay">Streak: 0</div>
<div id="timerDisplay">Time left: 10</div>
<div id="musicPrompt">Click anywhere for Background Music</div>
</div>
<div id="leaderboard">
<h1>Recent Leaderboard</h1>
<div id="leaderboardTable">
<table>
<thead>
<tr><th>Name</th><th>Score</th></tr>
</thead>
<tbody id="leaderboardBody"></tbody>
</table>
</div>
<button id="returnBtn" onclick="showGame()">Return to Game</button>
<button id="resetBtnBottom" onclick="resetLeaderboard()">Reset Leaderboard</button>
</div>
<audio id="bgMusic" loop="">
<source src="https://github.com/xantum21/Math-Game/blob/main/MathSong.mp3?raw=true" type="audio/mpeg"/>
</audio>
<audio id="yesSound">
<source src="https://github.com/xantum21/Math-Game/blob/main/Yes.mp3?raw=true" type="audio/mpeg"/>
</audio>
<audio id="noSound">
<source src="https://github.com/xantum21/Math-Game/blob/main/No.mp3?raw=true" type="audio/mpeg"/>
</audio>
<script>
    let streak = 0;
    let currentAnswer;
    let timer;
    let timeLeft = 5;

    function generateQuestion() {
      const operations = ['+', '-', '*'];
      const op = operations[Math.floor(Math.random() * operations.length)];
      const a = Math.floor(Math.random() * 10) + 1;
      const b = Math.floor(Math.random() * 10) + 1;

      const question = `${a} ${op} ${b}`;
      currentAnswer = eval(question);
      currentAnswer = Math.round(currentAnswer * 100) / 100;
      document.getElementById("question").textContent = question;
      document.getElementById("answerInput").value = "";
      document.getElementById("feedback").textContent = "";
      resetTimer();
    }

    function checkAnswer() {
      const userAnswer = parseFloat(document.getElementById("answerInput").value);
      const feedback = document.getElementById("feedback");
      const streakDisplay = document.getElementById("streakDisplay");

      if (userAnswer === currentAnswer) {
        feedback.textContent = "Correct!";
        feedback.className = "feedback correct";
        document.getElementById("yesSound").play();
        streak++;
        streakDisplay.className = "streak green";
        streakDisplay.textContent = `Streak: ${streak}`;
        generateQuestion();
      } else {
        feedback.textContent = "Wrong";
        feedback.className = "feedback wrong";
        document.getElementById("noSound").play();
        streakDisplay.className = "streak red";
        promptAndRecordStreak();
        streak = 0;
        streakDisplay.textContent = `Streak: ${streak}`;
      }
    }

    function promptAndRecordStreak() {
      const playerName = prompt("Enter your name for the leaderboard:");
      if (!playerName) return;
      const leaderboard = JSON.parse(localStorage.getItem("math_leaderboard") || "[]");
      leaderboard.push({ name: playerName, score: streak });
      localStorage.setItem("math_leaderboard", JSON.stringify(leaderboard));
    }

    function resetTimer() {
      clearInterval(timer);
      timeLeft = 5;
      document.getElementById("timerDisplay").textContent = `Time left: ${timeLeft}`;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timerDisplay").textContent = `Time left: ${timeLeft}`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById("noSound").play();
          promptAndRecordStreak();
          streak = 0;
          document.getElementById("streakDisplay").className = "streak red";
          document.getElementById("streakDisplay").textContent = `Streak: ${streak}`;
        }
      }, 1000);
    }

    function showGame() {
      document.getElementById("gameSection").style.display = "block";
      document.getElementById("leaderboard").style.display = "none";
      generateQuestion();
    }

    function showLeaderboard() {
      const table = document.getElementById("leaderboardBody");
      table.innerHTML = "";
      const scores = JSON.parse(localStorage.getItem("math_leaderboard") || "[]");
      scores.slice(-10).reverse().forEach(entry => {
        const row = `<tr><td>${entry.name}</td><td>${entry.score}</td></tr>`;
        table.innerHTML += row;
      });
      document.getElementById("gameSection").style.display = "none";
      document.getElementById("leaderboard").style.display = "block";
    }

    function resetLeaderboard() {
      localStorage.removeItem("math_leaderboard");
      showLeaderboard();
    }

    document.body.addEventListener("click", function() {
      const music = document.getElementById("bgMusic");
      if (music.paused) {
        music.play().catch(e => console.log("Music autoplay blocked."));
      }
    });

    document.getElementById("answerInput").addEventListener("keypress", function (e) {
      if (e.key === "Enter") checkAnswer();
    });

    window.onload = showGame;
  </script>
</body>
